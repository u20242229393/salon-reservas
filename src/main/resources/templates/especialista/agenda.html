<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Girls Club - Mi Agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,700&family=Poppins:wght@300;400;600&display=swap');
        :root { --rose-quartz:#F9CBD6; --blush:#F2AFBC; --red-wine:#9E182B; --oat-milk:#F2E0D2; --blanco-puro:#FFFFFF; }
        body { background-color:var(--oat-milk); font-family:'Poppins',sans-serif; color:#2D2D2D; }
        .navbar-spec { background:var(--blanco-puro); border-bottom:3px solid var(--rose-quartz); padding:15px 0; }
        .brand-logo { font-family:'Playfair Display',serif; font-weight:800; font-size:1.8rem; color:var(--red-wine); text-decoration:none; }
        .card-premium { background:var(--blanco-puro); border:none; border-radius:20px; box-shadow:0 10px 30px rgba(158,24,43,0.06); padding:24px; }
        .card-stats { background:var(--blanco-puro); border:none; border-radius:15px; border-left:5px solid var(--blush); padding:16px 20px; box-shadow:0 5px 15px rgba(158,24,43,0.04); }
        .text-wine { color:var(--red-wine) !important; }
        .cita-item { display:flex; gap:14px; align-items:flex-start; padding:14px 0; border-bottom:1px solid var(--rose-quartz); }
        .cita-item:last-child { border-bottom:none; }
        .cita-dot { width:12px; height:12px; border-radius:50%; margin-top:4px; flex-shrink:0; }
        .dot-pending { background:#f59e0b; }
        .dot-done    { background:#16a34a; }
        .cita-hora   { font-weight:700; font-size:0.85rem; color:var(--red-wine); min-width:55px; }
        .pay-badge { display:inline-block; font-size:0.75rem; padding:2px 8px; border-radius:20px; font-weight:600; }
        .pay-efectivo      { background:#E6F4EA; color:#198754; }
        .pay-tarjeta       { background:#E2F0FD; color:#0D6EFD; }
        .pay-transferencia { background:#FEEFC3; color:#B35B00; }
        .pay-datafono      { background:#F3E5F5; color:#8E24AA; }
        .nav-tabs .nav-link.active { color:var(--red-wine); border-bottom:2px solid var(--red-wine); font-weight:600; background:none; }
        .nav-tabs .nav-link { color:#888; border:none; }
        .nav-tabs { border-bottom:1px solid var(--rose-quartz); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-spec mb-4 shadow-sm">
    <div class="container">
        <a class="brand-logo" th:href="@{/especialista/agenda}">The Girls Club
            <span style="font-family:'Poppins';font-size:1rem;font-weight:400;color:#666">| Mi agenda</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <div class="d-flex align-items-center gap-2">
                <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold"
                     style="width:34px;height:34px;background:var(--rose-quartz);color:var(--red-wine);font-size:.85rem">
                    <i class="bi bi-person-fill"></i>
                </div>
                <span class="small text-muted" th:text="${profesional != null ? profesional.nombre : 'Profesional'}">Nombre</span>
            </div>
            <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">
                <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesion
            </a>
        </div>
    </div>
</nav>

<div class="container pb-5">

    <div th:if="${exito}" class="alert alert-success small py-2 rounded-3 mb-3">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card-stats">
                <div class="small text-muted mb-1">Citas pendientes</div>
                <div class="fw-bold fs-3 text-wine" th:text="${pendientes.size()}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-stats" style="border-left-color:var(--red-wine)">
                <div class="small text-muted mb-1">Citas atendidas</div>
                <div class="fw-bold fs-3 text-wine" th:text="${realizadas.size()}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-stats" style="border-left-color:var(--rose-quartz)">
                <div class="small text-muted mb-1">Total en mi agenda</div>
                <div class="fw-bold fs-3 text-wine" th:text="${todasMisCitas.size()}">0</div>
            </div>
        </div>
    </div>

    <div class="card-premium">
        <h4 class="fw-bold text-wine mb-3"><i class="bi bi-calendar-heart me-2"></i>Mis citas</h4>

        <ul class="nav nav-tabs mb-3" id="agendaTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pendientesTab">
                    Pendientes <span class="badge bg-warning text-dark ms-1" th:text="${pendientes.size()}">0</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#atendidasTab">
                    Atendidas <span class="badge bg-success ms-1" th:text="${realizadas.size()}">0</span>
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="pendientesTab">
                <div th:if="${#lists.isEmpty(pendientes)}" class="text-center text-muted py-4">
                    <i class="bi bi-check2-all d-block fs-2 mb-2" style="color:var(--blush)"></i>
                    Sin citas pendientes. Todo al dia!
                </div>
                <div th:each="r : ${pendientes}" class="cita-item">
                    <div class="cita-dot dot-pending"></div>
                    <div class="cita-hora" th:text="${#temporals.format(r.fechaHoraCita,'HH:mm')}">HH:mm</div>
                    <div class="flex-grow-1">
                        <div style="font-weight:600;font-size:.9rem" th:text="${r.cliente != null ? r.cliente.nombre : 'Clienta'}">Nombre</div>
                        <div style="font-size:.82rem;color:#666">
                            <span th:text="${r.servicio != null ? r.servicio.nombre : '-'}">Servicio</span>
                            <span th:if="${r.servicio != null}"> &middot; <span th:text="${r.servicio.duracionMinutos} + ' min'"></span></span>
                        </div>
                        <div class="mt-1">
                            <span class="small text-muted me-2" th:text="${#temporals.format(r.fechaHoraCita,'dd/MM/yyyy')}">Fecha</span>
                            <span th:if="${r.metodoPago == 'EFECTIVO'}"      class="pay-badge pay-efectivo">Efectivo</span>
                            <span th:if="${r.metodoPago == 'TARJETA'}"       class="pay-badge pay-tarjeta">Tarjeta</span>
                            <span th:if="${r.metodoPago == 'TRANSFERENCIA'}" class="pay-badge pay-transferencia">Transf.</span>
                            <span th:if="${r.metodoPago == 'DATAFONO'}"      class="pay-badge pay-datafono">Datafono</span>
                        </div>
                    </div>
                    <form th:action="@{/especialista/marcar-atendida}" method="post">
                        <input type="hidden" name="reservaId" th:value="${r.id}">
                        <button type="submit" class="btn btn-sm btn-outline-success rounded-pill fw-bold px-3">
                            <i class="bi bi-check2 me-1"></i>Atendida
                        </button>
                    </form>
                </div>
            </div>

            <div class="tab-pane fade" id="atendidasTab">
                <div th:if="${#lists.isEmpty(realizadas)}" class="text-center text-muted py-4">
                    <i class="bi bi-calendar-x d-block fs-2 mb-2" style="color:var(--blush)"></i>
                    Aun no has atendido citas.
                </div>
                <div th:each="r : ${realizadas}" class="cita-item">
                    <div class="cita-dot dot-done"></div>
                    <div class="cita-hora" th:text="${#temporals.format(r.fechaHoraCita,'HH:mm')}">HH:mm</div>
                    <div class="flex-grow-1">
                        <div style="font-weight:600;font-size:.9rem" th:text="${r.cliente != null ? r.cliente.nombre : 'Clienta'}">Nombre</div>
                        <div style="font-size:.82rem;color:#666">
                            <span th:text="${r.servicio != null ? r.servicio.nombre : '-'}">Servicio</span>
                        </div>
                        <span class="small text-muted" th:text="${#temporals.format(r.fechaHoraCita,'dd/MM/yyyy')}">Fecha</span>
                    </div>
                    <span class="badge bg-success rounded-pill px-3">Realizada</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
