<!DOCTYPE html>
<!--
    especialista/agenda.html — Agenda de la especialista
    =====================================================
    Panel personal de la especialista con sus citas pendientes
    y atendidas. Textos internacionalizados con #{clave}.
-->
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{layout/layout :: head}">
    <style>
        .navbar-spec { background:var(--blanco-puro); border-bottom:3px solid var(--rose-quartz); padding:15px 0; }
        .card-stats { background:var(--blanco-puro); border:none; border-radius:15px; border-left:5px solid var(--blush); padding:16px 20px; box-shadow:0 5px 15px rgba(158,24,43,0.04); }
        .cita-item { display:flex; gap:14px; align-items:flex-start; padding:14px 0; border-bottom:1px solid var(--rose-quartz); }
        .cita-item:last-child { border-bottom:none; }
        .cita-dot { width:12px; height:12px; border-radius:50%; margin-top:4px; flex-shrink:0; }
        .dot-pending { background:#f59e0b; }
        .dot-done    { background:#16a34a; }
        .cita-hora { font-weight:700; font-size:0.85rem; color:var(--red-wine); min-width:55px; }
        .pay-badge { display:inline-block; font-size:0.75rem; padding:2px 8px; border-radius:20px; font-weight:600; }
        .pay-efectivo      { background:#E6F4EA; color:#198754; }
        .pay-tarjeta       { background:#E2F0FD; color:#0D6EFD; }
        .pay-transferencia { background:#FEEFC3; color:#B35B00; }
        .pay-datafono      { background:#F3E5F5; color:#8E24AA; }
        .nav-tabs .nav-link.active { color:var(--red-wine); border-bottom:2px solid var(--red-wine); font-weight:600; background:none; }
        .nav-tabs .nav-link { color:#888; border:none; }
        .nav-tabs { border-bottom:1px solid var(--rose-quartz); }
    </style>
</head>
<body>

<!-- Navbar de especialista — usa layout general con roles -->
<nav th:replace="~{layout/layout :: navbar}"></nav>

<main id="contenido-principal" class="container pb-5 mt-4">

    <div th:if="${exito}" class="alert alert-success small py-2 rounded-3 mb-3"
         role="status" aria-live="polite">
        <i class="bi bi-check-circle-fill me-2" aria-hidden="true"></i>
        <span th:text="${exito}"></span>
    </div>

    <!-- Estadísticas rápidas -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card-stats">
                <div class="small text-muted mb-1" th:text="#{agenda.pendientes}">Citas pendientes</div>
                <div class="fw-bold fs-3 text-wine" th:text="${pendientes.size()}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-stats" style="border-left-color:var(--red-wine)">
                <div class="small text-muted mb-1" th:text="#{agenda.atendidas}">Citas atendidas</div>
                <div class="fw-bold fs-3 text-wine" th:text="${realizadas.size()}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-stats" style="border-left-color:var(--rose-quartz)">
                <div class="small text-muted mb-1" th:text="#{agenda.total}">Total en mi agenda</div>
                <div class="fw-bold fs-3 text-wine" th:text="${todasMisCitas.size()}">0</div>
            </div>
        </div>
    </div>

    <div class="card-premium p-4">
        <h1 class="h5 fw-bold text-wine mb-3">
            <i class="bi bi-calendar-heart me-2" aria-hidden="true"></i>
            <span th:text="#{agenda.titulo}">Mis citas</span>
        </h1>

        <!-- Tabs: Pendientes / Atendidas -->
        <ul class="nav nav-tabs mb-3" id="agendaTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab"
                        data-bs-target="#pendientesTab" role="tab"
                        th:attr="aria-label=#{agenda.pendientes}">
                    <span th:text="#{agenda.pendientes}">Pendientes</span>
                    <span class="badge bg-warning text-dark ms-1"
                          th:text="${pendientes.size()}">0</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                        data-bs-target="#atendidasTab" role="tab"
                        th:attr="aria-label=#{agenda.atendidas}">
                    <span th:text="#{agenda.atendidas}">Atendidas</span>
                    <span class="badge bg-success ms-1"
                          th:text="${realizadas.size()}">0</span>
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- Tab: Pendientes -->
            <div class="tab-pane fade show active" id="pendientesTab" role="tabpanel">
                <div th:if="${#lists.isEmpty(pendientes)}"
                     class="text-center text-muted py-4">
                    <i class="bi bi-check2-all d-block fs-2 mb-2"
                       style="color:var(--blush)" aria-hidden="true"></i>
                    <span th:text="#{agenda.sin_pendientes}">Sin citas pendientes. ¡Todo al día!</span>
                </div>
                <div th:each="r : ${pendientes}" class="cita-item">
                    <div class="cita-dot dot-pending" aria-hidden="true"></div>
                    <div class="cita-hora"
                         th:text="${#temporals.format(r.fechaHoraCita,'HH:mm')}">HH:mm</div>
                    <div class="flex-grow-1">
                        <div style="font-weight:600;font-size:.9rem"
                             th:text="${r.cliente != null ? r.cliente.nombre : 'Clienta'}">Nombre</div>
                        <div style="font-size:.82rem;color:#666">
                            <span th:text="${r.servicio != null ? r.servicio.nombre : '-'}">Servicio</span>
                            <span th:if="${r.servicio != null}">
                                &middot;
                                <span th:text="${r.servicio.duracionMinutos} + ' min'"></span>
                            </span>
                        </div>
                        <div class="mt-1">
                            <span class="small text-muted me-2"
                                  th:text="${#temporals.format(r.fechaHoraCita,'dd/MM/yyyy')}">Fecha</span>
                            <span th:if="${r.metodoPago == 'EFECTIVO'}"      class="pay-badge pay-efectivo" th:text="#{reserva.efectivo}">Efectivo</span>
                            <span th:if="${r.metodoPago == 'TARJETA'}"       class="pay-badge pay-tarjeta" th:text="#{reserva.tarjeta}">Tarjeta</span>
                            <span th:if="${r.metodoPago == 'TRANSFERENCIA'}" class="pay-badge pay-transferencia" th:text="#{reserva.transferencia}">Transf.</span>
                            <span th:if="${r.metodoPago == 'DATAFONO'}"      class="pay-badge pay-datafono" th:text="#{reserva.datafono}">Datáfono</span>
                        </div>
                    </div>
                    <!-- Botón para marcar cita como atendida -->
                    <form th:action="@{/especialista/marcar-atendida}" method="post">
                        <input type="hidden" name="reservaId" th:value="${r.id}">
                        <button type="submit"
                                class="btn btn-sm btn-outline-success rounded-pill fw-bold px-3"
                                th:attr="aria-label=#{agenda.marcar_atendida} + ' ' + ${r.cliente != null ? r.cliente.nombre : ''}">
                            <i class="bi bi-check2 me-1" aria-hidden="true"></i>
                            <span th:text="#{agenda.marcar_atendida}">Atendida</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Tab: Atendidas -->
            <div class="tab-pane fade" id="atendidasTab" role="tabpanel">
                <div th:if="${#lists.isEmpty(realizadas)}"
                     class="text-center text-muted py-4">
                    <i class="bi bi-calendar-x d-block fs-2 mb-2"
                       style="color:var(--blush)" aria-hidden="true"></i>
                    <span th:text="#{agenda.sin_atendidas}">Aún no has atendido citas.</span>
                </div>
                <div th:each="r : ${realizadas}" class="cita-item">
                    <div class="cita-dot dot-done" aria-hidden="true"></div>
                    <div class="cita-hora"
                         th:text="${#temporals.format(r.fechaHoraCita,'HH:mm')}">HH:mm</div>
                    <div class="flex-grow-1">
                        <div style="font-weight:600;font-size:.9rem"
                             th:text="${r.cliente != null ? r.cliente.nombre : 'Clienta'}">Nombre</div>
                        <div style="font-size:.82rem;color:#666"
                             th:text="${r.servicio != null ? r.servicio.nombre : '-'}">Servicio</div>
                        <span class="small text-muted"
                              th:text="${#temporals.format(r.fechaHoraCita,'dd/MM/yyyy')}">Fecha</span>
                    </div>
                    <span class="badge bg-success rounded-pill px-3"
                          th:text="#{dashboard.estado_realizada}">Realizada</span>
                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{layout/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
