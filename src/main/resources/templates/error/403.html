<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Girls Club - Acceso denegado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Poppins:wght@300;400;600&display=swap');
        :root{--rose-quartz:#F9CBD6;--red-wine:#9E182B;--oat-milk:#F2E0D2;}
        body{background-color:var(--oat-milk);font-family:'Poppins',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .brand{font-family:'Playfair Display',serif;font-weight:800;color:var(--red-wine);}
        .error-card{background:#fff;border-radius:20px;padding:50px 40px;text-align:center;max-width:460px;box-shadow:0 10px 30px rgba(158,24,43,0.08);}
        .btn-wine{background-color:var(--red-wine);color:#fff;border:none;border-radius:30px;padding:10px 28px;font-weight:600;text-decoration:none;display:inline-block;transition:.3s;}
        .btn-wine:hover{background-color:#F2AFBC;color:var(--red-wine);}
    </style>
</head>
<body>
<div class="error-card">
    <div style="font-size:4rem;color:var(--rose-quartz);margin-bottom:16px"><i class="bi bi-lock-fill"></i></div>
    <h2 class="brand mb-2">Acceso restringido</h2>
    <p class="text-muted mb-1">No tienes permiso para acceder a esta seccion.</p>
    <p class="text-muted small mb-4">Si crees que esto es un error, contacta a la administradora.</p>
    <a th:href="@{/}" class="btn-wine"><i class="bi bi-house me-2"></i>Volver al inicio</a>
</div>
</body>
</html>
