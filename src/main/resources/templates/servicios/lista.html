<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/layout :: head}">
    <style>
        :root {
            --oat-milk: #F2E0D2;
            --red-wine: #9E182B;
            --rose-quartz: #F9CBD6;
            --blush: #F2AFBC;
        }
        body {
            background-color: var(--oat-milk) !important;
            font-family: 'Playfair Display', 'Poppins', sans-serif;
            color: #2D2D2D;
        }
        .card-servicio {
            border: none;
            background-color: #FFFFFF;
            border-radius: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-servicio:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(158, 24, 43, 0.15);
        }
        .btn-premium {
            background-color: var(--red-wine);
            color: #FFFFFF;
            border: none;
            border-radius: 25px;
            padding: 8px 20px;
        }
        .btn-premium:hover {
            background-color: var(--blush);
            color: var(--red-wine);
        }
    </style>
</head>
<body>
<nav th:replace="~{layout/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="breadcrumb-container bg-white p-3 rounded shadow-sm mb-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a th:href="@{/}" style="color: var(--red-wine); text-decoration: none;"><i class="bi bi-house-heart"></i> Inicio</a></li>
                <li class="breadcrumb-item active" aria-current="page" style="color: #6c757d;">Nuestro Menú de Servicios</li>
            </ol>
        </nav>
    </div>

    <h2 class="text-center fw-bold mb-5" style="color: var(--red-wine); letter-spacing: 1px;">Experiencias Exclusivas</h2>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="servicio : ${servicios}">
            <div class="card h-100 card-servicio shadow-sm">
                <img th:src="${servicio.id == 1 ? '/images/esculpidas.jpg' : (servicio.id == 2 ? '/images/pedicura.jpg' : '/images/default-nail.jpg')}"
                     class="card-img-top" alt="Procedimiento" style="height: 220px; object-fit: cover; border-top-left-radius: 15px; border-top-right-radius: 15px;">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold" style="color: var(--red-wine);" th:text="${servicio.nombre}">Nombre</h5>
                    <p class="card-text text-muted flex-grow-1" th:text="${servicio.descripcion}">Descripción</p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="fw-bold fs-5" style="color: var(--red-wine);" th:text="'$' + ${#numbers.formatDecimal(servicio.precio, 0, 'POINT', 0, 'COMMA')}">Precio</span>
                        <small class="text-muted"><i class="bi bi-clock me-1"></i> <span th:text="${servicio.duracionMinutos} + ' min'"></span></small>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0 pb-4 text-center">
                    <a th:href="@{/reservas/formulario(servicioId=${servicio.id})}" class="btn btn-premium w-100 fw-bold">Agendar Espacio</a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout/layout :: footer}" class="mt-5"></footer>
</body>
</html>
