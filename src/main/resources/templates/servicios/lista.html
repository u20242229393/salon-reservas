<!DOCTYPE html>
<!--
    servicios/lista.html — Catálogo de servicios del salón
    =======================================================
    Muestra todos los servicios activos cargados desde la BD.
    Solo aparecen servicios con activo=true (findByActivoTrue).
    Textos internacionalizados con #{clave}.
-->
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{layout/layout :: head}">
    <style>
        /* Tarjeta de servicio con efecto hover de elevación */
        .card-servicio {
            border: none;
            background-color: #FFFFFF;
            border-radius: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-servicio:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(158,24,43,0.15);
        }
        /* Botón para agendar desde el catálogo */
        .btn-premium {
            background-color: var(--red-wine);
            color: #FFFFFF;
            border: none;
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 600;
            text-decoration: none;
            display: block;
            transition: all .3s;
        }
        .btn-premium:hover, .btn-premium:focus {
            background-color: var(--blush);
            color: var(--red-wine);
            outline: 3px solid var(--rose-quartz);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
<nav th:replace="~{layout/layout :: navbar}"></nav>

<main id="contenido-principal" class="container mt-4 pb-5">

    <!-- Breadcrumb internacionalizado -->
    <nav aria-label="breadcrumb" class="mb-4">
        <div class="bg-white p-3 rounded-3 shadow-sm">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item">
                    <a th:href="@{/}" style="color:var(--red-wine);text-decoration:none">
                        <i class="bi bi-house-heart me-1" aria-hidden="true"></i>
                        <span th:text="#{servicios.breadcrumb_inicio}">Inicio</span>
                    </a>
                </li>
                <!-- aria-current="page" indica la página actual (accesibilidad) -->
                <li class="breadcrumb-item active" aria-current="page"
                    th:text="#{servicios.breadcrumb_actual}">
                    Nuestro Menú de Servicios
                </li>
            </ol>
        </div>
    </nav>

    <!-- Título de sección internacionalizado -->
    <h1 class="text-center fw-bold mb-5"
        style="color:var(--red-wine);letter-spacing:1px;font-family:'Playfair Display',serif"
        th:text="#{servicios.titulo}">
        Experiencias Exclusivas
    </h1>

    <!-- ── Grid de servicios ────────────────────────────────────────
         th:each itera la lista "servicios" del controlador.
         Solo servicios activos (activo=true) son enviados por el controller.
    ─────────────────────────────────────────────────────────────── -->
    <div class="row row-cols-1 row-cols-md-3 g-4" role="list">
        <div class="col" th:each="servicio : ${servicios}" role="listitem">
            <article class="card h-100 card-servicio shadow-sm">

                <!-- Imagen del servicio:
                     Si tiene imagenUrl → la muestra
                     Si no → placeholder con emoji 💅
                     onerror: si la URL falla, muestra placeholder
                -->
                <img th:if="${servicio.imagenUrl != null and !servicio.imagenUrl.isEmpty()}"
                     th:src="${servicio.imagenUrl}"
                     th:alt="${servicio.nombre}"
                     class="card-img-top"
                     style="height:220px;object-fit:cover;border-top-left-radius:15px;border-top-right-radius:15px"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <!-- Placeholder si no tiene imagen configurada -->
                <div th:style="${servicio.imagenUrl != null and !servicio.imagenUrl.isEmpty()} ? 'display:none' : ''"
                     class="card-img-top d-flex align-items-center justify-content-center"
                     style="height:220px;background:var(--rose-quartz);border-top-left-radius:15px;border-top-right-radius:15px;font-size:4rem"
                     aria-hidden="true">
                    💅
                </div>

                <div class="card-body d-flex flex-column">
                    <!-- Nombre del servicio -->
                    <h2 class="card-title fw-bold h5"
                        style="color:var(--red-wine)"
                        th:text="${servicio.nombre}">Nombre</h2>

                    <!-- Descripción del servicio -->
                    <p class="card-text text-muted flex-grow-1"
                       th:text="${servicio.descripcion}">Descripción</p>

                    <!-- Precio y duración en la misma fila -->
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="fw-bold fs-5" style="color:var(--red-wine)"
                              th:text="'$' + ${#numbers.formatDecimal(servicio.precio,0,'POINT',0,'COMMA')}">
                            Precio
                        </span>
                        <small class="text-muted">
                            <i class="bi bi-clock me-1" aria-hidden="true"></i>
                            <span th:text="${servicio.duracionMinutos} + ' min'"></span>
                        </small>
                    </div>
                </div>

                <!-- Botón para ir al formulario con el servicio preseleccionado -->
                <div class="card-footer bg-transparent border-0 pb-4 text-center">
                    <a th:href="@{/reservas/formulario(servicioId=${servicio.id})}"
                       class="btn-premium"
                       th:text="#{servicios.btn_agendar}"
                       th:attr="aria-label=#{servicios.btn_agendar} + ' ' + ${servicio.nombre}">
                        Agendar Espacio
                    </a>
                </div>
            </article>
        </div>
    </div>

    <!-- Mensaje si no hay servicios activos -->
    <div th:if="${#lists.isEmpty(servicios)}" class="text-center py-5 text-muted">
        <i class="bi bi-scissors d-block fs-1 mb-3"
           style="color:var(--rose-quartz)" aria-hidden="true"></i>
        <p>No hay servicios disponibles en este momento.</p>
    </div>

</main>

<footer th:replace="~{layout/layout :: footer}"></footer>
</body>
</html>
