<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Girls Club - Iniciar sesion">
    <title>The Girls Club - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,700&family=Poppins:wght@300;400;600&display=swap');
        :root{--rose-quartz:#F9CBD6;--blush:#F2AFBC;--red-wine:#9E182B;--oat-milk:#F2E0D2;--blanco:#FFFFFF;}
        *{box-sizing:border-box;}
        body{background-color:var(--oat-milk);font-family:'Poppins',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .login-card{background:var(--blanco);border-radius:24px;padding:44px 40px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(158,24,43,0.10);}
        .brand-title{font-family:'Playfair Display',serif;font-weight:800;font-size:2.4rem;color:var(--red-wine);line-height:1.1;}
        .form-control{border-radius:12px!important;border:1.5px solid var(--rose-quartz)!important;padding:11px 16px;font-size:14px;transition:.2s;}
        .form-control:focus{border-color:var(--red-wine)!important;box-shadow:0 0 0 3px rgba(158,24,43,0.08)!important;}
        .form-label{font-size:13px;font-weight:600;color:#555;margin-bottom:6px;}
        .input-group-text{border:1.5px solid var(--rose-quartz)!important;border-right:none!important;background:transparent!important;border-radius:12px 0 0 12px!important;color:#aaa;}
        .input-group .form-control{border-left:none!important;border-radius:0 12px 12px 0!important;}
        .input-group:focus-within .input-group-text{border-color:var(--red-wine)!important;}
        .btn-wine{background:var(--red-wine);color:#fff;border:none;border-radius:30px;font-weight:600;font-size:15px;padding:12px;width:100%;transition:.3s;}
        .btn-wine:hover,.btn-wine:focus{background:#7A1121;color:#fff;outline:3px solid var(--blush);outline-offset:2px;}
        .btn-google{background:#fff;color:#3c4043;border:1.5px solid #dadce0;border-radius:30px;font-weight:500;font-size:14px;padding:11px;width:100%;transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;}
        .btn-google:hover,.btn-google:focus{background:#f8f9fa;border-color:#bbb;color:#3c4043;outline:2px solid var(--blush);}
        .google-icon{width:20px;height:20px;flex-shrink:0;}
        .divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--rose-quartz);}
        .divider span{font-size:12px;color:#bbb;font-weight:500;white-space:nowrap;}
        .alert-login{background:#fce8eb;color:var(--red-wine);border:1px solid var(--rose-quartz);border-radius:12px;padding:10px 14px;font-size:13px;margin-bottom:16px;}
        .alert-success-login{background:#E6F4EA;color:#198754;border:1px solid #C0DD97;border-radius:12px;padding:10px 14px;font-size:13px;margin-bottom:16px;}
        .link-wine{color:var(--red-wine);text-decoration:none;font-weight:600;}
        .link-wine:hover,.link-wine:focus{color:var(--blush);text-decoration:underline;}
        .toggle-pass{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#aaa;cursor:pointer;font-size:16px;padding:4px;}
        .toggle-pass:focus{outline:2px solid var(--red-wine);border-radius:4px;}
        /* Selector idioma login */
        .lang-bar{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
        .lang-btn{font-size:11px;padding:3px 10px;border:1px solid var(--rose-quartz);border-radius:20px;background:transparent;color:#666;text-decoration:none;transition:.2s;}
        .lang-btn:hover,.lang-btn:focus{background:var(--rose-quartz);color:var(--red-wine);}
        .lang-btn.active{background:var(--red-wine);color:#fff;border-color:var(--red-wine);}
    </style>
</head>
<body>
<main>
<div class="login-card" role="main">

    <!-- Selector de idioma -->
    <nav aria-label="Selección de idioma" class="lang-bar">
        <a th:href="@{/login(lang=es)}" class="lang-btn" th:classappend="${#locale.language == 'es'} ? ' active'" hreflang="es" aria-label="Español">🇨🇴 ES</a>
        <a th:href="@{/login(lang=en)}" class="lang-btn" th:classappend="${#locale.language == 'en'} ? ' active'" hreflang="en" aria-label="English">🇺🇸 EN</a>
        <a th:href="@{/login(lang=pt)}" class="lang-btn" th:classappend="${#locale.language == 'pt'} ? ' active'" hreflang="pt" aria-label="Português">🇧🇷 PT</a>
        <a th:href="@{/login(lang=it)}" class="lang-btn" th:classappend="${#locale.language == 'it'} ? ' active'" hreflang="it" aria-label="Italiano">🇮🇹 IT</a>
    </nav>

    <div class="text-center mb-4">
        <h1 class="brand-title" th:text="#{login.titulo}">The Girls Club</h1>
        <p class="text-muted small mt-1 mb-0" th:text="#{login.subtitulo}">Ingresa para gestionar tus citas</p>
    </div>

    <div th:if="${param.error}" class="alert-login" role="alert" aria-live="polite">
        <i class="bi bi-exclamation-circle-fill me-2" aria-hidden="true"></i>
        <span th:text="#{login.error}">Correo o contrasena incorrectos.</span>
    </div>
    <div th:if="${param.registro}" class="alert-success-login" role="status" aria-live="polite">
        <i class="bi bi-check-circle-fill me-2" aria-hidden="true"></i>
        <span th:text="#{login.registro_exitoso}">Cuenta creada exitosamente.</span>
    </div>
    <div th:if="${param.logout}" class="alert-success-login" role="status" aria-live="polite">
        <i class="bi bi-box-arrow-left me-2" aria-hidden="true"></i>
        <span th:text="#{login.logout}">Sesion cerrada.</span>
    </div>

    <form th:action="@{/login}" method="post" novalidate>
        <div class="mb-3">
            <label for="username" class="form-label" th:text="#{login.correo}">Correo</label>
            <div class="input-group">
                <span class="input-group-text" aria-hidden="true"><i class="bi bi-envelope"></i></span>
                <input type="email" id="username" name="username" class="form-control"
                       th:placeholder="#{login.correo}" required autocomplete="email"
                       aria-required="true" aria-describedby="emailHelp">
            </div>
        </div>
        <div class="mb-4">
            <label for="passInput" class="form-label d-flex justify-content-between align-items-center">
                <span th:text="#{login.password}">Contrasena</span>
                <a href="#" class="text-muted" style="font-size:12px;font-weight:400;text-decoration:none"
                   th:text="#{login.olvide_password}">Olvidaste tu contrasena?</a>
            </label>
            <div class="position-relative">
                <div class="input-group">
                    <span class="input-group-text" aria-hidden="true"><i class="bi bi-lock"></i></span>
                    <input type="password" id="passInput" name="password" class="form-control"
                           placeholder="••••••••" required autocomplete="current-password"
                           aria-required="true">
                </div>
                <button type="button" class="toggle-pass" onclick="togglePass()"
                        aria-label="Mostrar u ocultar contraseña">
                    <i class="bi bi-eye" id="passIcon" aria-hidden="true"></i>
                </button>
            </div>
        </div>
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="remember" name="remember-me">
                <label class="form-check-label small text-muted" for="remember"
                       th:text="#{login.recordarme}">Recordarme</label>
            </div>
        </div>
        <button type="submit" class="btn-wine mb-3" th:text="#{login.boton}">Iniciar Sesion</button>
    </form>

    <div class="divider"><span>o</span></div>

    <a href="/oauth2/authorization/google" class="btn-google mb-4"
       role="button" aria-label="Iniciar sesión con Google">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span th:text="#{login.google}">Continuar con Google</span>
    </a>

    <div class="text-center border-top pt-3" style="border-color:var(--rose-quartz)!important">
        <p class="small text-muted mb-1" th:text="#{login.no_cuenta}">No tienes cuenta?</p>
        <a th:href="@{/registro}" class="link-wine" th:text="#{login.registrate}">Registrate aqui</a>
    </div>
    <div class="text-center mt-3">
        <a th:href="@{/}" class="text-muted small text-decoration-none">
            <i class="bi bi-arrow-left" aria-hidden="true"></i>
            <span th:text="#{login.volver}">Volver al inicio</span>
        </a>
    </div>
</div>
</main>

<script>
function togglePass() {
    var input = document.getElementById('passInput');
    var icon  = document.getElementById('passIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
