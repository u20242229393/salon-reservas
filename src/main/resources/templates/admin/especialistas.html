<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Girls Club - Especialistas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Poppins:wght@300;400;600&display=swap');
        :root{--rose-quartz:#F9CBD6;--blush:#F2AFBC;--red-wine:#9E182B;--oat-milk:#F2E0D2;--blanco:#FFFFFF;}
        body{background:var(--oat-milk);font-family:'Poppins',sans-serif;color:#2D2D2D;}
        .navbar-admin{background:var(--blanco);border-bottom:3px solid var(--rose-quartz);padding:14px 0;}
        .brand-logo{font-family:'Playfair Display',serif;font-weight:800;font-size:1.8rem;color:var(--red-wine);text-decoration:none;}
        .card-premium{background:var(--blanco);border:none;border-radius:20px;box-shadow:0 10px 30px rgba(158,24,43,0.06);padding:28px;}
        .text-wine{color:var(--red-wine)!important;}
        .form-control,.form-select{border-radius:10px!important;border:1px solid var(--rose-quartz)!important;}
        .form-control:focus,.form-select:focus{border-color:var(--blush)!important;box-shadow:0 0 0 0.2rem rgba(242,175,188,0.25)!important;}
        .btn-wine{background:var(--red-wine);color:#fff;border:none;border-radius:30px;font-weight:600;padding:8px 20px;transition:.3s;}
        .btn-wine:hover{background:var(--blush);color:var(--red-wine);}
        .avatar{width:42px;height:42px;border-radius:50%;background:var(--rose-quartz);color:var(--red-wine);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0;}
        .esp-card{background:var(--blanco);border:1.5px solid var(--rose-quartz);border-radius:16px;padding:16px;transition:.2s;}
        .esp-card:hover{box-shadow:0 6px 20px rgba(158,24,43,0.08);transform:translateY(-2px);}
        .esp-card.inactiva{opacity:.55;border-style:dashed;}
        .badge-rol{background:var(--rose-quartz);color:var(--red-wine);border-radius:20px;padding:3px 10px;font-size:.75rem;font-weight:600;}
        .badge-activa{background:#E6F4EA;color:#198754;border-radius:20px;padding:3px 10px;font-size:.75rem;font-weight:600;}
        .badge-inactiva{background:#f8f9fa;color:#aaa;border-radius:20px;padding:3px 10px;font-size:.75rem;font-weight:600;}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-admin shadow-sm mb-4">
    <div class="container">
        <a class="brand-logo" th:href="@{/admin/dashboard}">The Girls Club
            <span style="font-family:'Poppins';font-size:1rem;font-weight:400;color:#999">| Admin</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
                <i class="bi bi-arrow-left me-1"></i>Dashboard
            </a>
            <form th:action="@{/logout}" method="post" style="margin:0">
                <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">
                    <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesion
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container pb-5">

    <!-- Alerts -->
    <div th:if="${exito}" class="alert alert-success alert-dismissible small rounded-3 py-2 mb-3">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible small rounded-3 py-2 mb-3">
        <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- FORMULARIO NUEVA ESPECIALISTA -->
        <div class="col-md-4">
            <div class="card-premium">
                <h5 class="fw-bold text-wine mb-1">
                    <i class="bi bi-person-plus-fill me-2"></i>Nueva especialista
                </h5>
                <p class="text-muted small mb-4">Crea el acceso para una nueva profesional del salon.</p>

                <form th:action="@{/admin/especialistas/crear}"
                      th:object="${nuevaEspecialista}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">Nombre completo</label>
                        <input type="text" th:field="*{nombre}" class="form-control"
                               placeholder="Lina Cardozo" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">Correo electronico</label>
                        <input type="email" th:field="*{correo}" class="form-control"
                               placeholder="lina@thegirlsclub.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">Telefono</label>
                        <input type="tel" th:field="*{telefono}" class="form-control"
                               placeholder="310 000 0000">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted">
                            Contrasena temporal <span class="fw-normal text-danger">*</span>
                        </label>
                        <input type="password" th:field="*{password}" class="form-control"
                               placeholder="Minimo 8 caracteres" minlength="8" required>
                        <p class="text-muted small mt-1 mb-0">
                            <i class="bi bi-info-circle me-1"></i>
                            La especialista podra cambiarla desde su perfil.
                        </p>
                    </div>
                    <button type="submit" class="btn btn-wine w-100">
                        <i class="bi bi-plus-circle me-2"></i>Crear especialista
                    </button>
                </form>
            </div>
        </div>

        <!-- LISTADO DE ESPECIALISTAS -->
        <div class="col-md-8">
            <div class="card-premium">
                <div class="d-flex align-items-center justify-content-between mb-4">
                    <div>
                        <h5 class="fw-bold text-wine mb-0">
                            <i class="bi bi-people-fill me-2"></i>Equipo de especialistas
                        </h5>
                        <p class="text-muted small mb-0"
                           th:text="${especialistas.size()} + ' profesional(es) registrada(s)'">0</p>
                    </div>
                </div>

                <!-- Sin especialistas -->
                <div th:if="${#lists.isEmpty(especialistas)}"
                     class="text-center text-muted py-5">
                    <i class="bi bi-person-x d-block fs-2 mb-2" style="color:var(--rose-quartz)"></i>
                    No hay especialistas registradas aun.
                </div>

                <!-- Grid de especialistas -->
                <div class="row g-3" th:if="${!#lists.isEmpty(especialistas)}">
                    <div class="col-md-6" th:each="esp : ${especialistas}">
                        <div th:class="${esp.activo ? 'esp-card' : 'esp-card inactiva'}">
                            <div class="d-flex align-items-start gap-3 mb-3">
                                <div class="avatar"
                                     th:text="${#strings.toUpperCase(#strings.substring(esp.nombre,0,1))}">L</div>
                                <div class="flex-grow-1">
                                    <div class="fw-bold" style="font-size:.95rem" th:text="${esp.nombre}">Nombre</div>
                                    <div class="text-muted small" th:text="${esp.correo}">correo</div>
                                    <div class="mt-1 d-flex gap-2 flex-wrap">
                                        <span class="badge-rol">Especialista</span>
                                        <span th:if="${esp.activo}" class="badge-activa">
                                            <i class="bi bi-check-circle me-1"></i>Activa
                                        </span>
                                        <span th:unless="${esp.activo}" class="badge-inactiva">
                                            <i class="bi bi-pause-circle me-1"></i>Inactiva
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${esp.telefono != null and !esp.telefono.isEmpty()}"
                                 class="small text-muted mb-3">
                                <i class="bi bi-phone me-1"></i><span th:text="${esp.telefono}"></span>
                            </div>

                            <div class="d-flex gap-2">
                                <!-- Activar/Desactivar -->
                                <form th:action="@{/admin/especialistas/{id}/desactivar(id=${esp.id})}"
                                      method="post" style="flex:1">
                                    <button type="submit"
                                            th:class="${esp.activo ? 'btn btn-sm btn-outline-warning w-100 rounded-pill fw-bold' : 'btn btn-sm btn-outline-success w-100 rounded-pill fw-bold'}"
                                            th:text="${esp.activo ? 'Desactivar' : 'Activar'}">
                                        Desactivar
                                    </button>
                                </form>
                                <!-- Eliminar -->
                                <form th:action="@{/admin/especialistas/{id}/eliminar(id=${esp.id})}"
                                      method="post"
                                      onsubmit="return confirm('Eliminar a esta especialista permanentemente?')">
                                    <button type="submit"
                                            class="btn btn-sm btn-outline-danger rounded-pill fw-bold px-3">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
