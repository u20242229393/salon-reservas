<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/layout :: head}">
    <style>
        :root {
            --oat-milk: #F2E0D2;
            --red-wine: #9E182B;
        }
        body { background-color: var(--oat-milk) !important; }
        .info-box { background: white; border-radius: 15px; padding: 25px; }
        .map-container { border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
<nav th:replace="~{layout/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="row g-4">
        <div class="col-md-5">
            <div class="info-box shadow-sm h-100">
                <h3 class="fw-bold mb-4" style="color: var(--red-wine);">Canales de Contacto</h3>

                <div class="d-flex align-items-center mb-3">
                    <div class="fs-3 me-3" style="color: var(--red-wine);"><i class="bi bi-geo-alt-fill"></i></div>
                    <div>
                        <h6 class="mb-0 fw-bold">Ubicación</h6>
                        <p class="text-muted mb-0 small">Neiva, Huila, Colombia</p>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-3">
                    <div class="fs-3 me-3" style="color: var(--red-wine);"><i class="bi bi-telephone-fill"></i></div>
                    <div>
                        <h6 class="mb-0 fw-bold">Teléfono / WhatsApp</h6>
                        <p class="text-muted mb-0 small">+57 300 123 4567</p>
                    </div>
                </div>

                <div class="d-flex align-items-center">
                    <div class="fs-3 me-3" style="color: var(--red-wine);"><i class="bi bi-clock-fill"></i></div>
                    <div>
                        <h6 class="mb-0 fw-bold">Horario de Atención</h6>
                        <p class="text-muted mb-0 small">Lunes a Sábado: 8:00 AM - 7:00 PM</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="map-container h-100">
                <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3984.606775191834!2d-75.29801862529737!3d2.943145497033221!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e3b74635676b7e3%3A0x6b772023cb2f9cd!2sNeiva%2C%20Huila!5e0!3m2!1ses!2sco!4v1716075600000!5m2!1ses!2sco"
                        width="100%"
                        height="380"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout/layout :: footer}" class="mt-5"></footer>
</body>
</html>
